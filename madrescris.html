<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feliz Día de las Madres · Mamá Cris 🌹</title>
    <link rel="stylesheet" href="madres-cris.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&display=swap" rel="stylesheet">
</head>
<body>

<!-- FONDOS -->
<div class="bg-layer active" id="bg0"></div>
<div class="bg-layer" id="bg1"></div>
<div class="bg-layer" id="bg2"></div>
<div class="bg-layer" id="bg3"></div>

<!-- VIGNETA -->
<div class="vignette"></div>

<!-- PARTÍCULAS -->
<canvas id="particleCanvas"></canvas>

<!-- ===== PANTALLA ===== -->
<div class="screen">

    <!-- HEADER -->
    <header class="header">
        <div class="date-badge">
            <span>🌹</span> 10 de Mayo · 2026 <span>🌹</span>
        </div>
        <h1 class="title-line-1">Feliz Día de las Madres</h1>
        <h2 class="title-line-2">Mamá Cris</h2>
    </header>

    <!-- MENSAJES -->
    <section class="message-zone">
        <div class="card-glow"></div>
        <div class="message-card" id="messageCard"></div>
    </section>

    <!-- RAMO DE ROSAS -->
    <footer class="footer">
        <div class="bouquet-wrap">
            <svg class="bouquet-svg" viewBox="0 0 220 162" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="stemGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#7aaa60"/>
                        <stop offset="100%" stop-color="#4a7a3a"/>
                    </linearGradient>
                    <linearGradient id="bandGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="#f06888"/>
                        <stop offset="100%" stop-color="#a82e50"/>
                    </linearGradient>
                    <linearGradient id="ribbonGrad" x1="0" y1="0" x2="1" y2="0">
                        <stop offset="0%" stop-color="#c83a62"/>
                        <stop offset="50%" stop-color="#f890aa"/>
                        <stop offset="100%" stop-color="#c83a62"/>
                    </linearGradient>
                    <filter id="roseGlow" x="-40%" y="-40%" width="180%" height="180%">
                        <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
                        <feMerge>
                            <feMergeNode in="coloredBlur"/>
                            <feMergeNode in="SourceGraphic"/>
                        </feMerge>
                    </filter>
                    <filter id="sparkleGlow" x="-200%" y="-200%" width="500%" height="500%">
                        <feGaussianBlur stdDeviation="2" result="blur"/>
                        <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
                    </filter>
                </defs>

                <!-- Tallos -->
                <path d="M65 140 Q62 120 56 96" stroke="url(#stemGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>
                <path d="M110 144 Q108 118 106 86" stroke="url(#stemGrad)" stroke-width="4.5" fill="none" stroke-linecap="round"/>
                <path d="M155 140 Q158 120 164 96" stroke="url(#stemGrad)" stroke-width="3.5" fill="none" stroke-linecap="round"/>

                <!-- Hojas -->
                <path d="M60 115 Q46 109 48 98 Q59 102 60 115Z" fill="#6aaa5a" opacity="0.92"/>
                <path d="M59 126 Q46 132 44 121 Q55 117 59 126Z" fill="#58904a" opacity="0.85"/>
                <path d="M107 112 Q93 106 95 95 Q106 99 107 112Z" fill="#6aaa5a" opacity="0.92"/>
                <path d="M108 124 Q122 118 120 107 Q110 111 108 124Z" fill="#58904a" opacity="0.85"/>
                <path d="M160 113 Q174 107 172 96 Q161 100 160 113Z" fill="#6aaa5a" opacity="0.92"/>
                <path d="M161 125 Q148 131 146 120 Q157 116 161 125Z" fill="#58904a" opacity="0.85"/>

                <!-- Rosas -->
                <text class="rose-side" x="56" y="95" text-anchor="middle" font-size="46" filter="url(#roseGlow)">🌹</text>
                <text class="rose-center" x="106" y="84" text-anchor="middle" font-size="62" filter="url(#roseGlow)">🌹</text>
                <text class="rose-side" x="164" y="95" text-anchor="middle" font-size="46" filter="url(#roseGlow)">🌹</text>

                <!-- Destellos dorados -->
                <circle cx="80" cy="68" r="2" fill="#f8d878" filter="url(#sparkleGlow)">
                    <animate attributeName="opacity" values="0;1;0" dur="2.1s" repeatCount="indefinite"/>
                    <animate attributeName="r" values="1;3;1" dur="2.1s" repeatCount="indefinite"/>
                </circle>
                <circle cx="135" cy="65" r="1.8" fill="#f8d878" filter="url(#sparkleGlow)">
                    <animate attributeName="opacity" values="0;1;0" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
                    <animate attributeName="r" values="1;2.8;1" dur="1.8s" begin="0.6s" repeatCount="indefinite"/>
                </circle>
                <circle cx="107" cy="48" r="2.5" fill="#fff" filter="url(#sparkleGlow)">
                    <animate attributeName="opacity" values="0;0.95;0" dur="2.6s" begin="1s" repeatCount="indefinite"/>
                    <animate attributeName="r" values="1.5;4;1.5" dur="2.6s" begin="1s" repeatCount="indefinite"/>
                </circle>
                <circle cx="58" cy="70" r="1.5" fill="#ffc0d8" filter="url(#sparkleGlow)">
                    <animate attributeName="opacity" values="0;0.8;0" dur="1.5s" begin="0.3s" repeatCount="indefinite"/>
                </circle>
                <circle cx="158" cy="72" r="1.5" fill="#ffc0d8" filter="url(#sparkleGlow)">
                    <animate attributeName="opacity" values="0;0.8;0" dur="1.9s" begin="0.9s" repeatCount="indefinite"/>
                </circle>

                <!-- Banda del ramo -->
                <rect x="58" y="132" width="104" height="16" rx="4" fill="url(#bandGrad)" opacity="0.97"/>
                <rect x="58" y="132" width="104" height="6" rx="4" fill="rgba(255,255,255,0.18)"/>

                <!-- Lazo -->
                <path d="M88 148 Q74 144 70 136 Q80 132 90 138 Q94 143 88 148Z" fill="url(#ribbonGrad)" opacity="0.95"/>
                <path d="M132 148 Q146 144 150 136 Q140 132 130 138 Q126 143 132 148Z" fill="url(#ribbonGrad)" opacity="0.95"/>
                <path d="M110 149 Q102 156 96 164" stroke="#c83a62" stroke-width="3.2" fill="none" stroke-linecap="round" opacity="0.85"/>
                <path d="M110 149 Q118 156 124 164" stroke="#c83a62" stroke-width="3.2" fill="none" stroke-linecap="round" opacity="0.85"/>
                <circle cx="110" cy="148" r="7" fill="#e8517a"/>
                <circle cx="110" cy="148" r="4" fill="#f890aa"/>
                <circle cx="108.5" cy="146.5" r="1.8" fill="rgba(255,255,255,0.65)"/>
            </svg>
        </div>
        <p class="footer-love">Con todo nuestro amor ❤️</p>
    </footer>
</div>

<script>
const MSGS=[
    {i:"💐", t:"Hoy, en tu día, queremos decirte que cada momento de amor que nos has dado ha moldeado lo mejor de <strong>quienes somos</strong>, mamá Cris."},
    {i:"🌹", t:"Eres la mujer que con su ternura convirtió cada día difícil en una <strong>lección de fortaleza y amor</strong>. Gracias por no rendirte nunca."},
    {i:"✨", t:"Tu forma de amar sin condiciones es el regalo más grande que existe. <strong>Gracias por estar siempre</strong> cuando más te necesitamos."},
    {i:"❤️", t:"No hay distancia que borre tu presencia. Llevas dentro de cada uno de nosotros <strong>tu luz, tu voz y tu abrazo</strong>, mamá."},
    {i:"🌸", t:"Por cada noche en vela, por cada lágrima que secaste y por cada sonrisa que nos regalaste… <strong>hoy te lo devolvemos con amor</strong>."},
    {i:"💝", t:"Tenerte como mamá es el mayor privilegio de mi vida. Eres mi <strong>primer amor y mi hogar más seguro</strong> en este mundo."},
    {i:"🌺", t:"Tu sabiduría, tu paciencia y tu alegría son el tesoro que llevamos en el corazón <strong>todos los días del año</strong>, no solo hoy."},
    {i:"🦋", t:"Donde sea que estemos, siempre hay un pedacito de ti. <strong>Tu amor es nuestra brújula</strong> y tu recuerdo nuestra fortaleza."},
    {i:"🌟", t:"Que este día sea tan luminoso como tú. Mereces todo lo hermoso que existe: <strong>felicidad, paz y amor infinito</strong>."},
    {i:"💫", t:"¡Feliz Día de las Madres, Cris! Hoy y siempre, <strong>gracias por existir y por amarnos</strong> con toda tu alma. ¡Te amamos!"}
];

const card = document.getElementById('messageCard');
MSGS.forEach((m,i)=>{
    const d = document.createElement('div');
    d.className = 'msg'+(i===0?' active':'');
    d.innerHTML = `<span class="mi">${m.i}</span><p>${m.t}</p>`;
    card.appendChild(d);
});

let cur=0;
const allMsgs = card.querySelectorAll('.msg');
setInterval(()=>{
    allMsgs[cur].classList.remove('active');
    cur=(cur+1)%allMsgs.length;
    allMsgs[cur].classList.add('active');
}, 9000);

const bgs=document.querySelectorAll('.bg-layer');
let cb=0;
setInterval(()=>{
    bgs[cb].classList.remove('active');
    cb=(cb+1)%bgs.length;
    bgs[cb].classList.add('active');
}, 8000);

const canvas=document.getElementById('particleCanvas');
const ctx=canvas.getContext('2d');
function rc(){ canvas.width=innerWidth; canvas.height=innerHeight; }
rc(); addEventListener('resize',rc);

class P{
    constructor(){ this.reset(true); }
    reset(sc){
        this.x=Math.random()*canvas.width;
        this.y=sc?Math.random()*canvas.height:-14;
        this.sz=Math.random()*2.8+0.7;
        this.sx=(Math.random()-.5)*.55;
        this.sy=Math.random()*.42+.16;
        this.op=Math.random()*.5+.22;
        const rr=Math.random();
        this.type=rr<.32?'star':rr<.60?'petal':rr<.82?'heart':'conf';
        this.hue=Math.random()*50+320;
        this.w=Math.random()*Math.PI*2;
        this.ws=Math.random()*.024+.007;
        if(this.type==='heart'){
            this.sz=Math.random()*5+3;
            this.sy=Math.random()*.32+.10;
            this.op=Math.random()*.38+.14;
        }
        if(this.type==='conf'){
            this.sz=Math.random()*4+2;
            this.hue=Math.random()*360;
            this.sy=Math.random()*.55+.28;
            this.rot=Math.random()*Math.PI*2;
            this.rs=(Math.random()-.5)*.14;
        }
    }
    update(){
        this.w+=this.ws;
        this.x+=this.sx+Math.sin(this.w)*.38;
        this.y+=this.sy;
        if(this.type==='conf') this.rot+=this.rs;
        if(this.y>canvas.height+16) this.reset(false);
        if(this.x<-22) this.x=canvas.width+22;
        if(this.x>canvas.width+22) this.x=-22;
    }
    draw(){
        ctx.save();
        ctx.globalAlpha=this.op;
        if(this.type==='star'){
            ctx.fillStyle='#fff';
            ctx.shadowColor='rgba(255,255,255,.85)';
            ctx.shadowBlur=8;
            ctx.beginPath();
            ctx.arc(this.x,this.y,this.sz,0,Math.PI*2);
            ctx.fill();
        } else if(this.type==='petal'){
            ctx.fillStyle=`hsl(${this.hue},74%,72%)`;
            ctx.shadowColor='rgba(200,72,110,.5)';
            ctx.shadowBlur=6;
            ctx.beginPath();
            ctx.ellipse(this.x,this.y,this.sz*2.2,this.sz*.85,this.w,0,Math.PI*2);
            ctx.fill();
        } else if(this.type==='heart'){
            ctx.fillStyle=`rgba(232,81,122,${this.op+.1})`;
            ctx.shadowColor='rgba(232,81,122,.6)';
            ctx.shadowBlur=12;
            ctx.globalAlpha=this.op;
            const s=this.sz;
            ctx.beginPath();
            ctx.moveTo(this.x,this.y+s*.3);
            ctx.bezierCurveTo(this.x,this.y,this.x-s,this.y,this.x-s,this.y+s*.42);
            ctx.bezierCurveTo(this.x-s,this.y+s*.92,this.x,this.y+s*1.32,this.x,this.y+s*1.62);
            ctx.bezierCurveTo(this.x,this.y+s*1.32,this.x+s,this.y+s*.92,this.x+s,this.y+s*.42);
            ctx.bezierCurveTo(this.x+s,this.y,this.x,this.y,this.x,this.y+s*.3);
            ctx.fill();
        } else {
            ctx.fillStyle=`hsl(${this.hue},84%,65%)`;
            ctx.translate(this.x,this.y);
            ctx.rotate(this.rot);
            ctx.fillRect(-this.sz/2,-this.sz*.28,this.sz,this.sz*.56);
        }
        ctx.restore();
    }
}

const parts=[];
for(let i=0;i<175;i++) parts.push(new P());
(function loop(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    parts.forEach(p=>{p.update();p.draw();});
    requestAnimationFrame(loop);
})();
</script>
</body>
</html>
